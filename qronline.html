<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كنترول محمود عادل | بريميوم</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>

    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --success-color: #4cc9f0;
            --bg-color: #f8f9fa;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2b2d42;
        }

        /* واجهة الموبايل الشيك */
        .app-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 25px 15px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 20px;
            margin: -40px 15px 20px 15px;
            border: none;
        }

        .upload-area {
            border: 2px dashed #dee2e6;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            background: #fdfdfd;
        }

        .upload-area:active { border-color: var(--primary-color); background: #f0f3ff; }

        .btn-action {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            width: 100%;
            margin-top: 10px;
        }

        .btn-cards { background: var(--primary-color); color: white; }
        .btn-qr { background: #7209b7; color: white; }
        .btn-print { background: #2b2d42; color: white; }

        /* تنسيق البطاقات (الطباعة) */
        #output { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 10px;
        }

        .card-item {
            background: white;
            border: 1px solid #000;
            height: 53mm;
            padding: 8px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            page-break-inside: avoid;
            border-radius: 5px;
        }

        .st-name-title {
            font-size: 14px;
            font-weight: bold;
            color: #d00000;
            border-bottom: 2px solid var(--primary-color);
            width: 100%;
            text-align: center;
            margin-bottom: 4px;
        }

        .data-rows {
            font-size: 11px;
            width: 100%;
            text-align: right;
            line-height: 1.2;
            overflow: hidden;
        }

        .qr-canvas { width: 95px !important; height: 95px !important; }

        .check-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            #output { gap: 5px; padding: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="app-header">
        <h2 class="mb-1">نظام محمود عادل</h2>
        <p class="small opacity-75">إدارة البطاقات والأكواد باحترافية</p>
    </div>

    <div class="main-card">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p class="mb-2">📁 اضغط لرفع ملف الإكسيل</p>
            <input type="file" id="fileInput" accept=".xlsx" style="display:none">
            <div id="fileName" class="small text-muted">لم يتم اختيار ملف</div>
        </div>

        <div id="config-area" style="display:none;">
            <hr>
            <label class="fw-bold mb-2 small text-secondary">اختر البيانات التي تريد تضمينها:</label>
            <div id="colsList" class="check-group"></div>
            
            <div class="row g-2">
                <div class="col-6">
                    <button onclick="process('cards')" class="btn-action btn-cards">📇 البطاقات</button>
                </div>
                <div class="col-6">
                    <button onclick="process('qrs')" class="btn-action btn-qr">🖼️ كيو آر فقط</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="output"></div>

<div class="no-print p-3 text-center">
    <button id="printBtn" onclick="window.print()" class="btn-action btn-print" style="display:none; width: 90%;">📄 حفظ كـ PDF / طباعة</button>
</div>

<script>
    let excelRows = [];
    let headers = [];

    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('fileName').innerText = file.name;

        const reader = new FileReader();
        reader.readAsArrayBuffer(file);
        reader.onload = function(e) {
            const wb = XLSX.read(e.target.result, {type: 'array'});
            const sheet = wb.Sheets[wb.SheetNames[0]];
            excelRows = XLSX.utils.sheet_to_json(sheet);
            headers = Object.keys(excelRows[0]);

            const colsList = document.getElementById('colsList');
            colsList.innerHTML = "";
            headers.forEach(h => {
                colsList.innerHTML += `
                    <div class="form-check">
                        <input type="checkbox" class="col-chk form-check-input" value="${h}" checked id="chk-${h}">
                        <label class="form-check-label small" for="chk-${h}">${h}</label>
                    </div>`;
            });
            document.getElementById('config-area').style.display = 'block';
        };
    };

    function process(mode) {
        const out = document.getElementById('output');
        const selectedCols = Array.from(document.querySelectorAll('.col-chk:checked')).map(c => c.value);
        out.innerHTML = "";

        excelRows.forEach((row, i) => {
            let infoText = "";
            let htmlData = "";
            selectedCols.forEach(f => {
                if(row[f]) {
                    infoText += `${f}: ${row[f]}\n`;
                    htmlData += `<div style="border-bottom:1px solid #eee; padding:1px 0;"><b>${f}:</b> ${row[f]}</div>`;
                }
            });

            const card = document.createElement('div');
            card.className = 'card-item';
            
            if(mode === 'cards') {
                card.innerHTML = `
                    <div class="st-name-title">${row[headers[0]]}</div>
                    <div class="data-rows">${htmlData}</div>
                    <div class="small text-muted" style="font-size:9px;">نظام محمود عادل</div>
                `;
            } else {
                card.innerHTML = `
                    <canvas id="qr-${i}" class="qr-canvas"></canvas>
                    <div class="fw-bold small text-center">${row[headers[0]]}</div>
                `;
                
                // رسم الكود بتأخير بسيط لضمان وجود الـ Canvas
                setTimeout(() => {
                    new QRious({
                        element: document.getElementById(`qr-${i}`),
                        value: infoText,
                        size: 200,
                        level: 'L'
                    });
                }, 50);
            }
            out.appendChild(card);
        });
        document.getElementById('printBtn').style.display = 'inline-block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
