<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كنترول محمود عادل | بريميوم</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --bg-color: #f8f9fa;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #2b2d42;
        }

        /* التصميم العصري للموبايل */
        .app-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px 15px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
        }

        .main-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 25px;
            margin: -30px 15px 20px 15px;
            border: none;
        }

        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            background: #fafbfc;
            cursor: pointer;
        }

        .btn-action {
            border-radius: 15px;
            padding: 14px;
            font-weight: 700;
            border: none;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-action:active { transform: scale(0.95); }

        .btn-cards { background: var(--primary-color); color: white; }
        .btn-qr { background: #7209b7; color: white; }
        .btn-print { background: #2b2d42; color: white; margin-top: 20px; }

        /* تنسيق الطباعة A4 */
        #output { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 10px;
        }

        .card-item {
            background: white;
            border: 1.2px solid #000;
            height: 53mm;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            page-break-inside: avoid;
            border-radius: 6px;
        }

        .st-name-title {
            font-size: 15px;
            font-weight: bold;
            color: #d00000;
            border-bottom: 2px solid var(--primary-color);
            text-align: center;
            padding-bottom: 3px;
        }

        .data-rows {
            font-size: 11px;
            line-height: 1.4;
            flex-grow: 1;
            margin-top: 5px;
        }

        .qr-wrapper { 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        /* ضبط حجم الكيو آر ليظهر بوضوح */
        .qr-wrapper img, .qr-wrapper canvas { 
            width: 90px !important; 
            height: 90px !important; 
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="app-header">
        <h2 class="fw-bold">نظام محمود عادل</h2>
        <p class="small opacity-75">إصدار الكنترول الذكي (يدعم العربية)</p>
    </div>

    <div class="main-card">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <h4 class="mb-2">📄</h4>
            <p class="mb-0 fw-bold">اختر ملف الإكسيل</p>
            <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none">
            <div id="fileName" class="text-muted small mt-2">لا يوجد ملف مختار</div>
        </div>

        <div id="config-area" style="display:none;">
            <hr class="my-4">
            <p class="small text-secondary fw-bold mb-3">حدد الأعمدة التي تريدها في البطاقة/الكود:</p>
            <div id="colsList" class="row row-cols-2 g-2 mb-4"></div>
            
            <div class="row g-2">
                <div class="col-6">
                    <button onclick="process('cards')" class="btn-action btn-cards">📇 البطاقات</button>
                </div>
                <div class="col-6">
                    <button onclick="process('qrs')" class="btn-action btn-qr">🖼️ كيو آر فقط</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="output"></div>

<div class="no-print p-4 text-center">
    <button id="printBtn" onclick="window.print()" class="btn-action btn-print" style="display:none; width: 90%;">📄 طباعة النسخة الحالية (PDF)</button>
</div>

<script>
    let excelRows = [];
    let headers = [];

    // دالة سحرية لتمكين الـ QR من فهم الحروف العربية
    function utf8_encode(argString) {
        if (argString === null || typeof argString === 'undefined') return "";
        return unescape(encodeURIComponent(argString));
    }

    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('fileName').innerText = file.name;

        const reader = new FileReader();
        reader.readAsArrayBuffer(file);
        reader.onload = function(e) {
            const wb = XLSX.read(e.target.result, {type: 'array'});
            const sheet = wb.Sheets[wb.SheetNames[0]];
            excelRows = XLSX.utils.sheet_to_json(sheet);
            headers = Object.keys(excelRows[0]);

            const colsList = document.getElementById('colsList');
            colsList.innerHTML = "";
            headers.forEach(h => {
                colsList.innerHTML += `
                    <div class="col">
                        <div class="form-check small">
                            <input type="checkbox" class="col-chk form-check-input" value="${h}" checked id="chk-${h}">
                            <label class="form-check-label" for="chk-${h}">${h}</label>
                        </div>
                    </div>`;
            });
            document.getElementById('config-area').style.display = 'block';
        };
    };

    function process(mode) {
        const out = document.getElementById('output');
        const selectedCols = Array.from(document.querySelectorAll('.col-chk:checked')).map(c => c.value);
        out.innerHTML = "<p class='text-center p-5'>جاري التوليد...</p>";

        let mainHtml = "";
        excelRows.forEach((row, i) => {
            let qrTxt = "";
            let htmlDetails = "";
            selectedCols.forEach(f => {
                if(row[f]) {
                    qrTxt += `${f}: ${row[f]}\n`;
                    htmlDetails += `<div class="d-flex justify-content-between border-bottom py-1"><b>${f}:</b> <span>${row[f]}</span></div>`;
                }
            });

            if(mode === 'cards') {
                mainHtml += `
                <div class="card-item">
                    <div class="st-name-title">${row[headers[0]] || 'طالب'}</div>
                    <div class="data-rows">${htmlDetails}</div>
                    <div style="font-size:9px; color:#aaa; text-align:center;">نظام محمود عادل الذكي</div>
                </div>`;
            } else {
                mainHtml += `
                <div class="card-item" style="align-items:center; justify-content:center;">
                    <div class="qr-wrapper" id="qr-box-${i}"></div>
                    <div class="fw-bold mt-2" style="font-size:13px;">${row[headers[0]]}</div>
                </div>`;
            }
        });

        out.innerHTML = mainHtml;
        document.getElementById('printBtn').style.display = 'inline-block';

        // رسم الـ QR فوراً مع دعم العربية
        if(mode === 'qrs') {
            setTimeout(() => {
                excelRows.forEach((row, i) => {
                    let textToCode = "";
                    selectedCols.forEach(f => { if(row[f]) textToCode += `${f}: ${row[f]}\n`; });
                    
                    const container = document.getElementById(`qr-box-${i}`);
                    if(container) {
                        new QRCode(container, {
                            text: utf8_encode(textToCode.trim()),
                            width: 100,
                            height: 100,
                            correctLevel: QRCode.CorrectLevel.L
                        });
                    }
                });
            }, 100);
        }
    }
</script>
</body>
</html>
