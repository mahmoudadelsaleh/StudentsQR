<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام محمود عادل النهائي</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #eee; direction: rtl; }
        .setup { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #output { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; border: 1px solid #000; height: 53mm; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-between; page-break-inside: avoid; }
        .data-text { font-size: 11px; width: 100%; text-align: right; }
        canvas { width: 90px; height: 90px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print setup">
    <h4>🎓 كنترول محمود عادل</h4>
    <input type="file" id="fileInput" accept=".xlsx">
    <div id="cols" style="margin: 10px 0; display: flex; flex-wrap: wrap; gap: 10px;"></div>
    <button onclick="render('cards')" style="padding: 10px; background: green; color: white;">بطاقات</button>
    <button onclick="render('qrs')" style="padding: 10px; background: blue; color: white;">QR فقط</button>
</div>

<div id="output"></div>

<script>
    let data = [];
    let heads = [];

    document.getElementById('fileInput').onchange = function(e) {
        const reader = new FileReader();
        reader.readAsArrayBuffer(e.target.files[0]);
        reader.onload = function(e) {
            const wb = XLSX.read(e.target.result, {type: 'array'});
            data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            heads = Object.keys(data[0]);
            
            const colsDiv = document.getElementById('cols');
            colsDiv.innerHTML = "";
            heads.forEach(h => {
                colsDiv.innerHTML += `<label><input type="checkbox" class="c-chk" value="${h}" checked> ${h}</label>`;
            });
        };
    };

    function render(mode) {
        const out = document.getElementById('output');
        const selected = Array.from(document.querySelectorAll('.c-chk:checked')).map(c => c.value);
        out.innerHTML = "";

        data.forEach((row, i) => {
            let info = "";
            selected.forEach(f => { if(row[f]) info += `${f}: ${row[f]}\n`; });

            const div = document.createElement('div');
            div.className = 'card';
            
            if(mode === 'cards') {
                div.innerHTML = `<div style="font-weight:bold;font-size:14px;">${row[heads[0]]}</div>
                                 <div class="data-text">${info.replace(/\n/g, '<br>')}</div>`;
            } else {
                div.innerHTML = `<canvas id="q-${i}"></canvas>
                                 <div style="font-weight:bold;">${row[heads[0]]}</div>`;
                
                // رسم الكود فوراً
                setTimeout(() => {
                    new QRious({
                        element: document.getElementById(`q-${i}`),
                        value: info,
                        size: 200
                    });
                }, 50);
            }
            out.appendChild(div);
        });
    }
</script>
</body>
</html>
