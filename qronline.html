<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كنترول محمود عادل | الإصدار النهائي</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>

    <style>
        :root { --main: #4361ee; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        
        .no-print { padding: 20px; }
        .app-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; }
        
        /* تنسيق البطاقات - ضغط كامل للأسطر */
        #output { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .label-box { 
            background: white; border: 1px solid #000; height: 53mm; padding: 6px; 
            display: flex; flex-direction: column; justify-content: flex-start;
            page-break-inside: avoid; border-radius: 4px; overflow: hidden;
        }
        
        .st-name { 
            color: #d00000; font-weight: bold; font-size: 14px; text-align: center; 
            border-bottom: 1.5px solid var(--main); margin-bottom: 2px; padding-bottom: 2px;
        }
        
        .data-content { font-size: 11px; line-height: 1.1; flex-grow: 1; }
        .data-item { border-bottom: 0.5px solid #eee; display: flex; padding: 1px 0; }
        .data-item b { width: 40%; color: #333; }

        .qr-area { text-align: center; margin-top: auto; padding-top: 4px; }
        canvas { max-width: 85px; max-height: 85px; }

        .btn-go { border-radius: 12px; padding: 12px; font-weight: bold; width: 100%; border: none; color: white; margin-top: 10px; }

        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body>

<div class="no-print container">
    <div class="app-card">
        <h4 class="text-center mb-4">🎓 نظام محمود عادل - QR المضمون</h4>
        <input type="file" id="fileIn" class="form-control mb-3" accept=".xlsx">
        
        <div id="opts" style="display:none;">
            <div id="colCheck" class="row row-cols-2 g-2 mb-3"></div>
            <div class="row g-2">
                <div class="col-6"><button onclick="render('cards')" class="btn-go" style="background:var(--main)">📇 البطاقات</button></div>
                <div class="col-6"><button onclick="render('qrs')" class="btn-go" style="background:#7209b7">🖼️ كيو آر فقط</button></div>
            </div>
        </div>
    </div>
</div>

<div id="output"></div>

<div class="no-print text-center mt-3">
    <button id="pBtn" onclick="window.print()" class="btn btn-dark w-75" style="display:none; border-radius:12px; padding:12px;">📄 حفظ PDF</button>
</div>

<script>
    let rows = [];
    let heads = [];

    document.getElementById('fileIn').onchange = function(e) {
        const reader = new FileReader();
        reader.readAsArrayBuffer(e.target.files[0]);
        reader.onload = function(e) {
            const wb = XLSX.read(e.target.result, {type:'array'});
            rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            heads = Object.keys(rows[0]);
            
            const div = document.getElementById('colCheck');
            div.innerHTML = "";
            heads.forEach(h => {
                div.innerHTML += `<div class="col"><div class="form-check small"><input type="checkbox" class="chk form-check-input" value="${h}" checked id="${h}"> <label class="form-check-label" for="${h}">${h}</label></div></div>`;
            });
            document.getElementById('opts').style.display = 'block';
        };
    };

    async function render(mode) {
        const out = document.getElementById('output');
        const selected = Array.from(document.querySelectorAll('.chk:checked')).map(c => c.value);
        out.innerHTML = "<p class='text-center p-5'>جاري الرسم بدقة عالية...</p>";

        let html = "";
        rows.forEach((r, i) => {
            let items = "";
            selected.forEach(f => { if(r[f]) items += `<div class="data-item"><b>${f}:</b><span>${r[f]}</span></div>`; });

            if(mode === 'cards') {
                html += `<div class="label-box"><div class="st-name">${r[heads[0]]}</div><div class="data-content">${items}</div><div class="qr-area"><canvas id="q-${i}"></canvas></div></div>`;
            } else {
                html += `<div class="label-box" style="justify-content:center; align-items:center;"><div class="qr-area"><canvas id="q-${i}"></canvas></div><div class="fw-bold mt-2">${r[heads[0]]}</div></div>`;
            }
        });

        out.innerHTML = html;
        document.getElementById('pBtn').style.display = 'inline-block';

        // الرسم باستخدام BWIP-JS المضمون
        for (let i = 0; i < rows.length; i++) {
            let txt = "";
            selected.forEach(f => { if(rows[i][f]) txt += `${f}:${rows[i][f]}\n`; });

            try {
                bwipjs.toCanvas(`q-${i}`, {
                    bcid: 'qrcode',
                    text: txt.trim(),
                    scale: 3,
                    height: 10,
                    width: 10,
                    padding: 0
                });
            } catch (e) { console.log("خطأ في الرسم: " + i); }
            
            if(i % 5 === 0) await new Promise(r => setTimeout(r, 10));
        }
    }
</script>
</body>
</html>
