<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الأكواد الذكي | Smart QR & Barcode</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 2rem; }
        .nav-pills .nav-link.active { background-color: var(--primary-color); }
        .nav-link { color: var(--primary-color); font-weight: 600; }
        #reader { border: 2px dashed #ccc; border-radius: 10px; overflow: hidden; }
        .result-box { background: #fff; border-right: 5px solid var(--accent-color); padding: 15px; margin-top: 15px; border-radius: 5px; }
        #qrcode-output img, #barcode-output { max-width: 100%; height: auto; margin: 20px auto; display: block; }
        .btn-download { display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="text-center my-4">
        <h1 class="display-5 fw-bold text-dark">نظام إدارة الأكواد <span class="text-primary">الذكي</span></h1>
        <p class="text-muted">إنشاء وقراءة الباركود والـ QR Code بسرعة واحترافية</p>
    </div>

    <div class="card main-card">
        <div class="card-header bg-white border-0">
            <ul class="nav nav-pills nav-justified mt-3" id="pills-tab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="pills-generate-tab" data-bs-toggle="pill" data-bs-target="#pills-generate">إنشاء كود جديد</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="pills-scan-tab" data-bs-toggle="pill" data-bs-target="#pills-scan">ماسح ضوئي (Scan)</button>
                </li>
            </ul>
        </div>
        
        <div class="card-body p-4">
            <div class="tab-content" id="pills-tabContent">
                
                <div class="tab-pane fade show active" id="pills-generate">
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">نوع الكود:</label>
                            <select id="code-type" class="form-select mb-3">
                                <option value="qr">QR Code (روابط/نصوص)</option>
                                <option value="barcode">Barcode (أرقام/منتجات)</option>
                            </select>
                            
                            <label class="form-label fw-bold">المحتوى:</label>
                            <textarea id="input-text" class="form-control" rows="3" placeholder="أدخل الرابط أو النص هنا..."></textarea>
                            
                            <div class="row mt-3">
                                <div class="col">
                                    <label class="form-label small">لون الكود:</label>
                                    <input type="color" id="color-dark" class="form-control form-control-color w-100" value="#000000">
                                </div>
                                <div class="col">
                                    <label class="form-label small">لون الخلفية:</label>
                                    <input type="color" id="color-light" class="form-control form-control-color w-100" value="#ffffff">
                                </div>
                            </div>

                            <button onclick="generate()" class="btn btn-primary w-100 mt-4 py-2 fw-bold">توليد الكود الآن</button>
                        </div>
                        
                        <div class="col-md-6 text-center border-start">
                            <div id="qrcode-output"></div>
                            <svg id="barcode-output" style="display:none;"></svg>
                            <button id="download-btn" onclick="downloadImage()" class="btn btn-outline-success btn-download">
                                تحميل الصورة بجودة عالية <i class="bi bi-download"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="pills-scan">
                    <div class="row justify-content-center">
                        <div class="col-md-8">
                            <div id="reader"></div>
                            <div class="result-box shadow-sm">
                                <h6 class="text-muted mb-2">النتيجة:</h6>
                                <div id="scan-result" class="fw-bold text-break text-primary">بانتظار مسح الكود...</div>
                                <button id="copy-btn" class="btn btn-sm btn-light mt-2" style="display:none;" onclick="copyResult()">نسخ النص</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // --- متغيرات عامة ---
    let currentQR = null;

    // --- وظيفة الإنشاء ---
    function generate() {
        const type = document.getElementById('code-type').value;
        const text = document.getElementById('input-text').value;
        const dark = document.getElementById('color-dark').value;
        const light = document.getElementById('color-light').value;
        const qrContainer = document.getElementById('qrcode-output');
        const barContainer = document.getElementById('barcode-output');
        const downloadBtn = document.getElementById('download-btn');

        if (!text) return alert("يرجى إدخال محتوى أولاً");

        qrContainer.innerHTML = ""; // مسح القديم
        barContainer.style.display = "none";
        downloadBtn.style.display = "block";

        if (type === 'qr') {
            qrContainer.style.display = "block";
            currentQR = new QRCode(qrContainer, {
                text: text,
                width: 250,
                height: 250,
                colorDark: dark,
                colorLight: light,
                correctLevel: QRCode.CorrectLevel.H
            });
        } else {
            qrContainer.style.display = "none";
            barContainer.style.display = "block";
            JsBarcode("#barcode-output", text, {
                format: "CODE128",
                lineColor: dark,
                background: light,
                width: 2,
                height: 100,
                displayValue: true
            });
        }
    }

    // --- وظيفة تحميل الكود كصورة ---
    function downloadImage() {
        const type = document.getElementById('code-type').value;
        let imgSource;
        
        if(type === 'qr') {
            imgSource = document.querySelector('#qrcode-output img').src;
        } else {
            const svg = document.getElementById('barcode-output');
            const xml = new XMLSerializer().serializeToString(svg);
            const svg64 = btoa(xml);
            imgSource = 'data:image/svg+xml;base64,' + svg64;
        }

        const link = document.createElement('a');
        link.href = imgSource;
        link.download = 'code-' + Date.now() + '.png';
        link.click();
    }

    // --- وظيفة الماسح الضوئي ---
    function onScanSuccess(decodedText) {
        document.getElementById('scan-result').innerText = decodedText;
        document.getElementById('copy-btn').style.display = 'inline-block';
        // تنبيه صوتي بسيط عند النجاح (اختياري)
        const audio = new Audio('https://www.soundjay.com/buttons/beep-07a.mp3');
        audio.play();
    }

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 15, 
        qrbox: {width: 250, height: 250},
        aspectRatio: 1.0 
    });
    
    html5QrcodeScanner.render(onScanSuccess);

    function copyResult() {
        const text = document.getElementById('scan-result').innerText;
        navigator.clipboard.writeText(text);
        alert("تم نسخ النص بنجاح!");
    }
</script>

</body>
</html>
