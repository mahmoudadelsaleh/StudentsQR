<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام محمود عادل - معالج البيانات الضخمة</title>
    
    <script src="xlsx.full.min.js"></script>
    <script src="qrcode.min.js"></script>
    <link rel="stylesheet" href="bootstrap.rtl.min.css">

    <style>
        body { background: #f4f7f6; font-family: sans-serif; padding: 10px; }
        .no-print { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #output { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label-card { 
            background: white; border: 1px solid #000; padding: 10px; 
            height: 52mm; display: flex; flex-direction: column; 
            justify-content: space-between; page-break-inside: avoid; 
        }
        .st-name { color: #d32f2f; font-weight: bold; font-size: 13px; text-align: center; border-bottom: 1px solid #3498db; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 10px; }
        .data-item { background: #f1f3f5; padding: 2px 5px; border-right: 3px solid #3498db; }
        .qr-wrapper { display: flex; justify-content: center; align-items: center; }
        canvas, img { width: 80px !important; height: 80px !important; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <h4 class="text-center text-primary">نظام الطلاب - معالجة دفعات 🎓</h4>
    <input type="file" id="excel-file" class="form-control mb-3" accept=".xlsx, .xls">
    
    <div class="row g-2 mb-3 bg-light p-2 rounded border">
        <div class="col-4"><label><input type="checkbox" class="data-opt" value="مسلسل" checked> مسلسل</label></div>
        <div class="col-4"><label><input type="checkbox" class="data-opt" value="كود الطالب" checked> كود</label></div>
        <div class="col-4"><label><input type="checkbox" class="data-opt" value="الرقم القومي" checked> قومي</label></div>
        <div class="col-4"><label><input type="checkbox" class="data-opt" value="الصف" checked> صف</label></div>
        <div class="col-4"><label><input type="checkbox" class="data-opt" value="النوع" checked> نوع</label></div>
        <div class="col-4"><label><input type="checkbox" class="data-opt" value="الجلوس" checked> جلوس</label></div>
        <div class="col-4"><label><input type="checkbox" class="data-opt" value="السري" checked> سري</label></div>
    </div>

    <button onclick="processData()" class="btn btn-success w-100 py-3 fw-bold">توليد كافة الطلاب (بدون توقف) ✨</button>
    <button onclick="window.print()" id="print-btn" class="btn btn-dark w-100 py-3 mt-2" style="display:none;">طباعة PDF</button>
    <div id="status" class="text-center mt-2 text-muted" style="font-size: 12px;"></div>
</div>

<div id="output"></div>

<script>
    async function processData() {
        const fileInput = document.getElementById('excel-file');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const opts = Array.from(document.querySelectorAll('.data-opt:checked')).map(c => c.value);

        if (!fileInput.files[0]) return alert("اختر الملف أولاً");

        const reader = new FileReader();
        reader.readAsArrayBuffer(fileInput.files[0]);

        reader.onload = async function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});

                output.innerHTML = "";
                status.innerText = "جاري المعالجة...";

                // استخدام دالة معالجة لتجنب الـ Overflow والتجمد
                for (let i = 0; i < rows.length; i++) {
                    let row = rows[i];
                    let cleanRow = {};
                    for (let key in row) { cleanRow[key.toString().trim()] = row[key]; }

                    let name = cleanRow['اسم الطالب'] || cleanRow['الاسم'] || "طالب " + (i+1);
                    const card = document.createElement('div');
                    card.className = 'label-card';
                    
                    let qrTxt = `الاسم: ${name}\n`;
                    let html = `<div><div class="st-name">${name}</div><div class="data-grid">`;
                    
                    opts.forEach(f => {
                        if (cleanRow[f]) {
                            html += `<div class="data-item"><b>${f}:</b> ${cleanRow[f]}</div>`;
                            qrTxt += `${f}: ${cleanRow[f]}\n`;
                        }
                    });

                    html += `</div></div><div class="qr-wrapper"><div id="qr-${i}"></div></div>`;
                    card.innerHTML = html;
                    output.appendChild(card);

                    // توليد QR واحد تلو الآخر لتجنب Overflow
                    new QRCode(document.getElementById(`qr-${i}`), {
                        text: qrTxt.trim(),
                        width: 80, height: 80,
                        correctLevel: QRCode.CorrectLevel.M
                    });

                    // تحديث الحالة كل 10 طلاب لراحة المعالج
                    if (i % 10 === 0) {
                        status.innerText = `تم معالجة ${i} من ${rows.length}`;
                        await new Promise(r => setTimeout(r, 10)); 
                    }
                }

                status.innerText = "تم الانتهاء بنجاح!";
                document.getElementById('print-btn').style.display = 'block';
            } catch (err) {
                alert("حدث خطأ: تأكد من ملف الإكسيل.");
            }
        };
    }
</script>
</body>
</html>
