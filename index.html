<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كنترول محمود عادل - الإصدار المستقر</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; padding: 15px; margin: 0; }
        .no-print { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #ddd; }
        .check-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .btn-run { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-print { background: #333; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; }
        
        /* تنسيق 10 بطاقات في ورقة A4 */
        #output { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
        .label-card { 
            background: white; border: 1px solid #000; padding: 10px; 
            height: 54mm; display: flex; flex-direction: column; 
            justify-content: space-between; box-sizing: border-box; 
            page-break-inside: avoid; border-radius: 6px; 
        }
        .st-name { color: #d32f2f; font-weight: bold; font-size: 14px; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 4px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 11px; margin-top: 5px; }
        .data-item { background: #f1f3f5; padding: 2px 5px; border-right: 3px solid #3498db; }
        .qr-wrapper { display: flex; justify-content: center; align-items: center; padding: 5px; }
        canvas, img { width: 85px !important; height: 85px !important; }

        @media print { .no-print { display: none !important; } #output { gap: 5px; } }
    </style>
</head>
<body>

<div class="no-print">
    <h3 style="text-align:center; color:#007bff; margin-top:0;">نظام طباعة بطاقات الطلاب 🎓</h3>
    
    <label><b>1. اختر ملف الإكسيل:</b></label>
    <input type="file" id="excel-file" style="display:block; width:100%; margin:10px 0;" accept=".xlsx, .xls">

    <label><b>2. اختر البيانات التي تظهر في الـ QR والبطاقة:</b></label>
    <div class="check-group">
        <label><input type="checkbox" class="data-opt" value="مسلسل" checked> مسلسل</label>
        <label><input type="checkbox" class="data-opt" value="كود الطالب" checked> كود</label>
        <label><input type="checkbox" class="data-opt" value="الرقم القومي" checked> قومي</label>
        <label><input type="checkbox" class="data-opt" value="الصف" checked> صف</label>
        <label><input type="checkbox" class="data-opt" value="النوع" checked> نوع</label>
        <label><input type="checkbox" class="data-opt" value="الجلوس" checked> جلوس</label>
        <label><input type="checkbox" class="data-opt" value="السري" checked> سري</label>
    </div>

    <button onclick="processData()" class="btn-run">توليد بطاقات كافة الطلاب ✨</button>
    <button onclick="window.print()" id="print-btn" class="btn-print" style="display:none;">تحميل / طباعة (A4)</button>
</div>

<div id="output"></div>

<script>
    function processData() {
        const fileInput = document.getElementById('excel-file');
        const output = document.getElementById('output');
        const selectedOpts = Array.from(document.querySelectorAll('.data-opt:checked')).map(c => c.value);

        if (!fileInput.files[0]) return alert("يرجى اختيار ملف أولاً");

        const reader = new FileReader();
        // استخدام ArrayBuffer بدلاً من Binary String لأفضل توافق مع الموبايل
        reader.readAsArrayBuffer(fileInput.files[0]);

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {defval: ""});

                if (rows.length === 0) throw new Error("الملف فارغ");

                output.innerHTML = ""; // مسح القديم

                // التنفيذ على كل الصفوف
                for(let i=0; i < rows.length; i++) {
                    let row = rows[i];
                    let cleanRow = {};
                    // تنظيف مفاتيح الأعمدة من المسافات
                    for (let key in row) { cleanRow[key.toString().trim()] = row[key]; }

                    let name = cleanRow['اسم الطالب'] || cleanRow['الاسم'] || "طالب " + (i+1);
                    
                    const card = document.createElement('div');
                    card.className = 'label-card';
                    
                    let qrTxt = `اسم الطالب: ${name}\n`;
                    let htmlContent = `<div><div class="st-name">${name}</div><div class="data-grid">`;

                    selectedOpts.forEach(opt => {
                        let val = cleanRow[opt] || "-";
                        htmlContent += `<div class="data-item"><b>${opt}:</b> ${val}</div>`;
                        qrTxt += `${opt}: ${val}\n`;
                    });

                    htmlContent += `</div></div><div class="qr-wrapper"><div id="qr-${i}"></div></div>`;
                    card.innerHTML = htmlContent;
                    output.appendChild(card);

                    // توليد الكود لكل طالب
                    new QRCode(document.getElementById(`qr-${i}`), {
                        text: qrTxt.trim(),
                        width: 90, height: 90,
                        correctLevel: QRCode.CorrectLevel.M
                    });
                }
                document.getElementById('print-btn').style.display = 'block';
            } catch (err) {
                alert("خطأ: " + err.message);
            }
        };
    }
</script>
</body>
</html>
