<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام محمود عادل - النسخة الشاملة</title>
    
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; padding: 10px; margin: 0; }
        .no-print { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn-main { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 15px; }
        #output { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .label-card { background: white; border: 1px solid #000; padding: 8px; height: 52mm; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; page-break-inside: avoid; border-radius: 5px; }
        .st-name { color: #d32f2f; font-weight: bold; font-size: 14px; text-align: center; border-bottom: 1px solid #3498db; padding-bottom: 3px; margin-bottom: 5px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; font-size: 10px; }
        .data-item { background: #f8f9fa; padding: 2px 4px; border-right: 3px solid #3498db; }
        .qr-wrapper { display: flex; justify-content: center; align-items: center; }
        .qr-wrapper canvas, .qr-wrapper img { width: 85px !important; height: 85px !important; }
        @media print { .no-print { display: none !important; } #output { gap: 2px; } }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container no-print">
    <div class="no-print">
        <h3 style="text-align:center; color:#007bff;">نظام الطلاب الذكي 🎓</h3>
        <p style="font-size:12px; text-align:center; color:red;">هذه النسخة تعمل على الموبايل مباشرة</p>
        
        <label><b>1. اختر ملف الإكسيل:</b></label>
        <input type="file" id="excel-file" style="display:block; width:100%; margin:10px 0;" accept=".xlsx, .xls">

        <button onclick="processData()" class="btn-main">توليد البطاقات ✨</button>
        <button onclick="window.print()" id="print-btn" class="btn-main" style="background:#333; display:none;">طباعة / حفظ PDF</button>
    </div>
</div>

<div id="output"></div>

<script>
    // وظيفة القراءة والتوليد
    function processData() {
        const fileInput = document.getElementById('excel-file');
        const output = document.getElementById('output');
        
        if (!fileInput.files[0]) return alert("يا مستر محمود، اختر الملف أولاً");

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {defval: ""});

                output.innerHTML = ""; 

                rows.forEach((row, i) => {
                    let cleanRow = {};
                    for (let key in row) { cleanRow[key.toString().trim()] = row[key].toString().trim(); }

                    let name = cleanRow['اسم الطالب'] || cleanRow['الاسم'] || "طالب بدون اسم";
                    const card = document.createElement('div');
                    card.className = 'label-card';
                    
                    let qrTxt = `الاسم: ${name}\n`;
                    let fields = ["مسلسل", "كود الطالب", "الرقم القومي", "الصف", "النوع", "الجلوس", "السري"];
                    
                    let html = `<div><div class="st-name">${name}</div><div class="data-grid">`;
                    fields.forEach(f => {
                        if (cleanRow[f]) {
                            html += `<div class="data-item"><b>${f}:</b> ${cleanRow[f]}</div>`;
                            qrTxt += `${f}: ${cleanRow[f]}\n`;
                        }
                    });
                    html += `</div></div><div class="qr-wrapper" id="qr-${i}"></div>`;
                    
                    card.innerHTML = html;
                    output.appendChild(card);

                    // توليد QR
                    new QRCode(document.getElementById(`qr-${i}`), {
                        text: qrTxt.trim(),
                        width: 90, height: 90,
                        correctLevel: QRCode.CorrectLevel.H
                    });
                });
                document.getElementById('print-btn').style.display = 'block';
            } catch (err) {
                alert("خطأ في قراءة البيانات، تأكد من ملف الإكسيل.");
            }
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }
</script>
</body>
</html>
